<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fluent Fly | Pro v73</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --accent: #6366f1; --accent-glow: rgba(99, 102, 241, 0.2);
            --bg: #0b0f1a; --card-bg: #161b2c; --text: #f8fafc; 
            --text-dim: #94a3b8; --success: #10b981; --danger: #ef4444; 
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { 
            background: var(--bg); background-image: radial-gradient(circle at 50% 0%, var(--accent-glow) 0%, transparent 50%);
            color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; padding-bottom: 100px; min-height: 100vh;
        }
        
        nav { position: fixed; bottom: 0; width: 100%; background: rgba(22, 27, 44, 0.9); backdrop-filter: blur(25px); display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid rgba(255,255,255,0.08); z-index: 1000; }
        .nav-btn { background: none; border: none; color: var(--text-dim); display: flex; flex-direction: column; align-items: center; font-size: 0.75rem; font-weight: 700; cursor: pointer; flex: 1; transition: 0.3s; }
        .nav-btn.active { color: var(--accent); }
        .nav-btn i { font-size: 1.5rem; margin-bottom: 4px; }

        .page { width: 90%; max-width: 600px; margin: 40px auto; display: none; animation: fadeIn 0.4s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card { background: var(--card-bg); padding: 30px; border-radius: 32px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 25px; box-shadow: 0 20px 40px rgba(0,0,0,0.3); position: relative; }
        h1 { font-size: 2.2rem; font-weight: 800; letter-spacing: -1px; margin-bottom: 20px; text-align: center; }
        
        input, select { width: 100%; background: #070a13; border: 2px solid #242b3d; padding: 16px; border-radius: 18px; color: white; margin-bottom: 12px; font-size: 1rem; transition: 0.2s; font-family: inherit; }
        input:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 0 4px var(--accent-glow); }
        
        .btn-main { background: var(--accent); color: white; border: none; padding: 18px; border-radius: 20px; font-weight: 800; width: 100%; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; margin-bottom: 10px; }
        .btn-sec { background: rgba(255,255,255,0.03); color: var(--text-dim); border: 1px solid #242b3d; padding: 14px; border-radius: 18px; font-weight: 700; width: 100%; cursor: pointer; margin-top: 5px; display: flex; align-items: center; justify-content: center; }

        .f-container { perspective: 1500px; width: 100%; height: 420px; cursor: pointer; margin-bottom: 25px; }
        .f-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); transform-style: preserve-3d; }
        .f-inner.flipped { transform: rotateY(180deg); }
        .f-inner.no-anim { transition: none !important; }
        .f-front, .f-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 35px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; border: 1px solid rgba(255,255,255,0.06); background: var(--card-bg); text-align: center; }
        .f-back { transform: rotateY(180deg); }

        .dropzone { border: 2px dashed #31394f; border-radius: 24px; padding: 25px; margin-bottom: 15px; cursor: pointer; background: rgba(0,0,0,0.2); text-align: center; color: var(--text-dim); transition: 0.2s; }
        
        .m-card { height: 110px; border-radius: 20px; background: var(--card-bg); border: 2px solid #242b3d; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; overflow: hidden; padding: 8px; text-align: center; font-size: 0.9rem; }
        .m-card.wrong { border-color: var(--danger) !important; box-shadow: 0 0 15px var(--danger); }
        .m-card.right { opacity: 0; transform: scale(0.5); pointer-events: none; }

        #modal { position: fixed; inset: 0; background: rgba(5, 7, 13, 0.98); display: none; align-items: center; justify-content: center; z-index: 10000; backdrop-filter: blur(20px); padding: 20px; }
        .modal-box { background: var(--card-bg); padding: 35px; border-radius: 40px; width: 100%; max-width: 480px; text-align: center; border: 1px solid rgba(255,255,255,0.1); max-height: 90vh; overflow-y: auto; }
        
        .prog-wrap { width: 100%; height: 10px; background: #070a13; border-radius: 20px; margin: 20px 0; overflow: hidden; }
        .prog-fill { height: 100%; background: linear-gradient(90deg, var(--accent), #a5b4fc); width: 0%; transition: 0.5s ease; }
        
        .t-q-card.correct { border: 2px solid var(--success) !important; background: rgba(16, 185, 129, 0.05); }
        .t-q-card.incorrect { border: 2px solid var(--danger) !important; background: rgba(239, 68, 68, 0.05); }
        .selected { border-color: var(--accent) !important; background: var(--accent-glow) !important; }

        .toggle-card { background: rgba(255,255,255,0.03); padding: 15px 20px; border-radius: 20px; border: 1px solid #242b3d; display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .switch { position: relative; display: inline-block; width: 50px; height: 26px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; inset: 0; background-color: #242b3d; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--accent); }
        input:checked + .slider:before { transform: translateX(24px); }

        .dot-box { display: flex; justify-content: center; gap: 8px; margin-bottom: 15px; }
        .m-dot { width: 12px; height: 12px; border-radius: 50%; background: #242b3d; }
        .m-dot.active { background: var(--success); box-shadow: 0 0 10px var(--success); }

        .confetti { position: absolute; width: 10px; height: 10px; z-index: 9999; pointer-events: none; }
        @keyframes fall { to { transform: translateY(700px) rotate(360deg); opacity: 0; } }
        
        /* New Match Penalty Styles */
        #m-timer.penalty { color: var(--danger) !important; transform: scale(1.1); transition: 0.2s; }
    </style>
</head>
<body>

<div id="toast" style="position:fixed; top:20px; left:50%; transform:translateX(-50%); background:var(--danger); color:white; padding:12px 25px; border-radius:15px; z-index:11000; display:none; font-weight:700;"></div>
<div id="modal"><div class="modal-box" id="modal-content"></div></div>

<nav>
    <button class="nav-btn active" onclick="app.tab('glossary')"><i class="fa-solid fa-layer-group"></i>Samling</button>
    <button class="nav-btn" onclick="app.tab('flash')"><i class="fa-solid fa-clone"></i>Kort</button>
    <button class="nav-btn" onclick="app.tab('match')"><i class="fa-solid fa-bolt"></i>Match</button>
    <button class="nav-btn" onclick="app.tab('mastery')"><i class="fa-solid fa-graduation-cap"></i>Mestre</button>
    <button class="nav-btn" onclick="app.tab('test')"><i class="fa-solid fa-file-signature"></i>Test</button>
</nav>

<div id="p-glossary" class="page active">
    <h1>Fluent Fly</h1>
    <div class="card">
        <div style="display:flex; gap:12px; margin-bottom: 20px;">
            <input type="text" id="set-name" placeholder="Navn på nytt sett...">
            <button class="btn-main" style="width:70px; padding:0; margin:0;" onclick="app.addSet()"><i class="fa-solid fa-plus"></i></button>
        </div>
        <div id="set-list"></div>
        <button class="btn-sec" onclick="app.showBackup()"><i class="fa-solid fa-arrows-rotate"></i> Data & Backup Hub</button>
    </div>

    <div id="editor" class="card" style="display:none;">
        <h2 id="edit-title">Sett</h2>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px; margin-top:15px;">
            <div>
                <label style="font-size:0.7rem; font-weight:800; color:var(--text-dim);">ORD</label>
                <select id="lang-w" onchange="app.saveLang()"></select>
                <input type="text" id="w-in" placeholder="Skriv ord...">
            </div>
            <div>
                <label style="font-size:0.7rem; font-weight:800; color:var(--text-dim);">BETYDNING</label>
                <select id="lang-d" onchange="app.saveLang()"></select>
                <input type="text" id="d-in" placeholder="Oversettelse...">
            </div>
        </div>
        <div class="dropzone" id="img-dropzone" onclick="document.getElementById('img-file').click()" ondragover="event.preventDefault()" ondrop="app.dropI(event)">
            <span id="img-hint"><i class="fa-regular fa-image"></i> Laste Opp / Dra bilde hit</span>
            <img id="img-prev" style="max-height:80px; border-radius:10px; display:none; margin:5px auto;">
            <input type="file" id="img-file" style="display:none" accept="image/*" onchange="app.handleI(this.files[0])">
        </div>
        <button class="btn-main" onclick="app.addWord()">Lagre Ord</button>
        <div id="word-list" style="margin-top:20px;"></div>
    </div>
</div>

<div id="p-mastery" class="page">
    <div class="card" id="ma-main">
        <h1>Mestre</h1>
        <select id="s-mast"></select>
        <div class="toggle-card">
            <span>Bruk bilder som spørsmål</span>
            <label class="switch"><input type="checkbox" id="ma-img-toggle" checked><span class="slider"></span></label>
        </div>
        <select id="ma-side-toggle"><option value="d">Svar med Betydning</option><option value="w">Svar med Ord</option></select>
        <button class="btn-main" onclick="app.startMast()">Begynn / Fortsett</button>
        <button class="btn-sec" style="color:var(--danger);" onclick="app.confirmResetMast()">Start helt forfra</button>
    </div>
    <div id="ma-game" style="display:none;">
        <div class="prog-wrap"><div class="prog-fill" id="ma-prog"></div></div>
        <div class="card" style="text-align:center;">
            <div class="dot-box" id="ma-dots"></div>
            <img id="ma-img" style="width:180px; height:180px; object-fit:cover; border-radius:30px; margin:0 auto 20px; display:none; border:2px solid #242b3d;">
            <h3 id="ma-q" style="font-size:1.8rem; margin:20px 0;"></h3>
            <input type="text" id="ma-in" placeholder="Svar..." autocomplete="off">
            <button class="btn-main" onclick="app.checkMast()">Sjekk</button>
            <p id="ma-f" style="color:var(--danger); font-weight:800; margin-top:10px;"></p>
        </div>
        <button class="btn-sec" onclick="app.tab('mastery')">Lagre & Avslutt</button>
    </div>
</div>

<div id="p-flash" class="page">
    <div class="card" id="f-main">
        <h1>Flashcards</h1>
        <select id="s-flash"></select>
        <div class="toggle-card">
            <span><b>Lydknapper på</b></span>
            <label class="switch"><input type="checkbox" id="f-audio-toggle" checked><span class="slider"></span></label>
        </div>
        <button class="btn-main" onclick="app.startFlash()">Start</button>
    </div>
    <div id="f-game" style="display:none;">
        <div class="prog-wrap"><div class="prog-fill" id="f-prog"></div></div>
        <div class="f-container" onclick="app.flipFlash()">
            <div class="f-inner" id="f-card">
                <div class="f-front">
                    <img id="f-img-front" style="width:180px; height:180px; object-fit:cover; border-radius:20px; margin-bottom:15px; display:none;">
                    <h2 id="f-txt-front" style="font-size:2rem;"></h2>
                    <button id="f-btn-speak-front" class="btn-sec" style="width:64px; height:64px; border-radius:50%; margin-top:15px;"><i class="fa-solid fa-volume-high"></i></button>
                </div>
                <div class="f-back">
                    <h2 id="f-txt-back" style="font-size:2rem;"></h2>
                    <button id="f-btn-speak-back" class="btn-sec" style="width:64px; height:64px; border-radius:50%; margin-top:15px;"><i class="fa-solid fa-volume-high"></i></button>
                </div>
            </div>
        </div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;"><button class="btn-sec" onclick="app.navFlash(-1)">Forrige</button><button class="btn-sec" onclick="app.navFlash(1)">Neste</button></div>
    </div>
</div>

<div id="p-match" class="page">
    <div class="card" id="m-main"><h1>Match</h1><select id="s-match"></select><button class="btn-main" onclick="app.startMatch()">Start Spill</button></div>
    <div id="m-game" style="display:none;">
        <h2 id="m-timer" style="text-align:center; color:var(--accent); font-size:2.5rem; margin-bottom:20px; transition:0.2s;">0.0s</h2>
        <div id="m-grid" style="display:grid; grid-template-columns:1fr 1fr; gap:10px;"></div>
        <button class="btn-sec" style="margin-top:20px;" onclick="app.tab('match')">Avbryt</button>
    </div>
</div>

<div id="p-test" class="page">
    <div class="card" id="t-main"><h1>Eksamen</h1><select id="s-test"></select><button class="btn-main" onclick="app.startTest()">Start Test</button></div>
    <div id="t-game" style="display:none;"><div id="t-list"></div><button class="btn-main" id="t-submit-btn" onclick="app.gradeTest()">Lever Svar</button><button class="btn-sec" id="t-exit-btn" style="display:none;" onclick="app.tab('test')">Lukk Gjennomgang</button></div>
</div>

<script>
const app = {
    lib: JSON.parse(localStorage.getItem('ff_pro_v69')) || {}, 
    langs: [{n:'Norsk', c:'nb-NO'}, {n:'English', c:'en-US'}, {n:'Deutsch', c:'de-DE'}, {n:'Español', c:'es-ES'}, {n:'Français', c:'fr-FR'}],
    tempI: null, activeSet: null, session: [], fIdx: 0, forceRetry: false, mSide: 'd', wrongList: [], mLocked: false, mTime: 0,

    init() { this.fillDrops(); this.renderSets(); this.initAudioEvents(); },
    save() { localStorage.setItem('ff_pro_v69', JSON.stringify(this.lib)); this.renderSets(); this.updateDrops(); },
    tab(id) {
        clearInterval(this.timer); this.mLocked = false;
        document.querySelectorAll('.page, .nav-btn').forEach(el => el.classList.remove('active'));
        document.getElementById('p-'+id).classList.add('active');
        document.querySelectorAll('.nav-btn').forEach(b => { if(b.getAttribute('onclick').includes(id)) b.classList.add('active'); });
        ['f-game', 'm-game', 'ma-game', 't-game'].forEach(g => { if(document.getElementById(g)) document.getElementById(g).style.display = 'none'; });
        ['f-main', 'm-main', 'ma-main', 't-main'].forEach(m => { if(document.getElementById(m)) document.getElementById(m).style.display = 'block'; });
        this.closeM();
    },

    toast(msg) { const t=document.getElementById('toast'); t.innerText=msg; t.style.display='block'; setTimeout(()=>t.style.display='none',2500); },
    modal(html) { document.getElementById('modal-content').innerHTML=html; document.getElementById('modal').style.display='flex'; },
    closeM() { document.getElementById('modal').style.display='none'; },

    /* BACKUP HUB */
    showBackup() {
        this.modal(`
            <h2 style="margin-bottom:15px;">Data Management</h2>
            <button class="btn-main" onclick="app.exportB()"><i class="fa-solid fa-download"></i> Backup (.json)</button>
            <div class="dropzone" id="v65-drop" onclick="document.getElementById('bak-f').click()" ondragover="event.preventDefault()" ondrop="app.importDrop(event)">
                <i class="fa-solid fa-file-import" style="font-size:1.5rem; margin-bottom:10px;"></i><br>
                Klikk eller dra fil her for import
                <input type="file" id="bak-f" style="display:none" onchange="app.importB(this)">
            </div>
            <button class="btn-sec" onclick="app.closeM()">Tilbake</button>
        `);
    },
    exportB() {
        const b = new Blob([JSON.stringify(this.lib)],{type:'application/json'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(b);
        a.download = `Fly_Backup_v73.json`; a.click();
    },
    importDrop(e) { e.preventDefault(); if(e.dataTransfer.files[0]) this.importB({files: e.dataTransfer.files}); },
    importB(inp) {
        const r = new FileReader(); r.onload = (e) => { this.lib = JSON.parse(e.target.result); this.save(); location.reload(); };
        r.readAsText(inp.files[0]);
    },

    /* IMAGE HANDLING */
    dropI(e) { e.preventDefault(); if(e.dataTransfer.files[0]) this.handleI(e.dataTransfer.files[0]); },
    handleI(file) {
        const r = new FileReader();
        r.onload = (e) => {
            const img = new Image(); img.onload = () => {
                const canvas = document.createElement('canvas'); const MAX = 400; const scale = MAX / img.width;
                canvas.width = MAX; canvas.height = img.height * scale;
                canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                this.tempI = canvas.toDataURL('image/jpeg', 0.7);
                document.getElementById('img-prev').src = this.tempI;
                document.getElementById('img-prev').style.display = 'block';
                document.getElementById('img-hint').style.display = 'none';
            }; img.src = e.target.result;
        }; r.readAsDataURL(file);
    },

    /* MASTERY ENGINE */
    confirmResetMast() {
        const s = document.getElementById('s-mast').value; if(!s) return;
        this.modal(`
            <h2>Nullstill?</h2>
            <p>Er du sikker på at du vil slette all fremgang for "${s}"?</p>
            <button class="btn-main" style="background:var(--danger);" onclick="app.doResetMast('${s}')">Ja, slett alt</button>
            <button class="btn-sec" onclick="app.closeM()">Avbryt</button>
        `);
    },
    doResetMast(s) { this.lib[s].words.forEach(w => w.s = 0); this.save(); this.closeM(); this.toast("Nullstilt!"); },
    
    startMast() {
        const s=document.getElementById('s-mast').value; if(!s || this.lib[s].words.length < 1) return;
        this.activeSet=s; this.mSide = document.getElementById('ma-side-toggle').value;
        this.useImg = document.getElementById('ma-img-toggle').checked;
        this.wrongList = [];
        
        let pool = this.lib[s].words.filter(w => (w.s || 0) < 3);
        if(!pool.length) {
            this.modal(`<h1>Fullført! 🎉</h1><p>Du har mestret alle ordene i dette settet.</p>
                <button class="btn-main" onclick="app.confirmResetMast()">Start forfra</button>
                <button class="btn-sec" onclick="app.closeM()">Lukk</button>`);
            return;
        }
        
        this.session = pool.slice(0, 20).sort(() => 0.5 - Math.random());
        document.getElementById('ma-main').style.display='none'; 
        document.getElementById('ma-game').style.display='block';
        this.nextMast();
    },
    nextMast() {
        const rem = this.session.filter(w => (w.s || 0) < 3);
        if(!rem.length) {
            this.confetti();
            const totalRemaining = this.lib[this.activeSet].words.filter(w => (w.s || 0) < 3).length;
            let analysis = this.wrongList.length > 0 ? 
                `<p style="margin:15px 0;">Fokusord:</p><div style="font-size:0.8rem; background:rgba(0,0,0,0.2); padding:15px; border-radius:15px; color:var(--text-dim); text-align:left;">${[...new Set(this.wrongList)].join(', ')}</div>` : 
                `<p style="color:var(--success); font-weight:800;">Feilfri batch! Utmerket.</p>`;
            
            let btnHtml = totalRemaining > 0 ? 
                `<button class="btn-main" onclick="app.startMast()">Fortsett (${totalRemaining} ord igjen)</button>` : 
                `<h2 style="color:var(--success); margin-top:20px;">Settet er 100% fullført!</h2><button class="btn-main" onclick="app.confirmResetMast()">Start forfra</button>`;

            this.modal(`
                <h1 style="font-size:2.5rem;">Batch Ferdig!</h1>
                ${analysis}
                <div style="margin-top:25px; display:flex; flex-direction:column; gap:10px;">
                    ${btnHtml}
                    <button class="btn-sec" onclick="app.tab('mastery')">Til Meny</button>
                </div>
            `);
            return;
        }
        this.cur = rem[Math.floor(Math.random() * rem.length)];
        this.forceRetry = false;
        document.getElementById('ma-img').src = this.cur.img || ""; 
        document.getElementById('ma-img').style.display = (this.useImg && this.cur.img) ? 'block' : 'none';
        document.getElementById('ma-q').innerText = this.mSide === 'd' ? (this.cur.w || "?") : this.cur.d;
        document.getElementById('ma-in').value = ''; document.getElementById('ma-f').innerText = '';
        const dots = document.getElementById('ma-dots'); dots.innerHTML = '';
        for(let i=0; i<3; i++) dots.innerHTML += `<div class="m-dot ${(this.cur.s||0)>i?'active':''}"></div>`;
        const pts = this.session.reduce((a,b) => a + (b.s||0), 0);
        document.getElementById('ma-prog').style.width = (pts / (this.session.length * 3) * 100) + '%';
        document.getElementById('ma-in').focus();
    },
    checkMast() {
        const val = document.getElementById('ma-in').value.trim().toLowerCase();
        const cor = (this.mSide === 'd' ? this.cur.d : this.cur.w).toLowerCase();
        if(val === cor) {
            if(!this.forceRetry) this.cur.s = (this.cur.s || 0) + 1;
            this.save(); this.nextMast();
        } else {
            this.forceRetry = true; this.wrongList.push(this.cur.w || this.cur.d);
            document.getElementById('ma-f').innerText = "Riktig: " + cor;
        }
    },

    /* AUDIO & FLASHCARDS */
    initAudioEvents() {
        document.getElementById('f-btn-speak-front').onclick = (e) => {
            e.stopPropagation();
            const set = this.lib[this.activeSet];
            this.speak(set.words[this.fIdx].w, set.langW);
        };
        document.getElementById('f-btn-speak-back').onclick = (e) => {
            e.stopPropagation();
            const set = this.lib[this.activeSet];
            this.speak(set.words[this.fIdx].d, set.langD);
        };
    },
    startFlash() {
        const s=document.getElementById('s-flash').value; if(!s || this.lib[s].words.length < 1) return;
        this.activeSet=s; this.fIdx=0; 
        document.getElementById('f-main').style.display='none'; document.getElementById('f-game').style.display='block';
        this.drawFlash();
    },
    drawFlash() {
        const cur=this.lib[this.activeSet].words[this.fIdx];
        const audioOn = document.getElementById('f-audio-toggle').checked;
        const cardEl = document.getElementById('f-card');
        cardEl.classList.add('no-anim');
        cardEl.classList.remove('flipped');
        document.getElementById('f-txt-front').innerText=cur.w||"";
        document.getElementById('f-img-front').src=cur.img||"";
        document.getElementById('f-img-front').style.display=cur.img?'block':'none';
        document.getElementById('f-txt-back').innerText=cur.d;
        document.getElementById('f-btn-speak-front').style.display = (audioOn && cur.w) ? 'flex' : 'none';
        document.getElementById('f-btn-speak-back').style.display = (audioOn && cur.d) ? 'flex' : 'none';
        document.getElementById('f-prog').style.width=((this.fIdx+1)/this.lib[this.activeSet].words.length*100)+'%';
        setTimeout(() => cardEl.classList.remove('no-anim'), 50);
    },
    flipFlash(){ document.getElementById('f-card').classList.toggle('flipped'); },
    navFlash(d){ const len=this.lib[this.activeSet].words.length; this.fIdx=(this.fIdx+d+len)%len; this.drawFlash(); },
    speak(t,l){ window.speechSynthesis.cancel(); const m=new SpeechSynthesisUtterance(t); m.lang=l; window.speechSynthesis.speak(m); },

    /* MATCH ENGINE - WITH PENALTY */
    startMatch() {
        const s=document.getElementById('s-match').value; if(!s || this.lib[s].words.length < 5) {
            this.toast("Settet må ha minst 5 ord for Match!");
            return;
        }
        this.activeSet=s; this.closeM(); this.mLocked = false; this.mTime = 0;
        document.getElementById('m-main').style.display='none'; document.getElementById('m-game').style.display='block';
        let count=0, sel=null; clearInterval(this.timer);
        
        const timerEl = document.getElementById('m-timer');
        timerEl.innerText = '0.0s';
        this.timer = setInterval(() => { this.mTime += 0.1; timerEl.innerText = this.mTime.toFixed(1) + 's'; }, 100);
        
        const pool = [...this.lib[s].words].sort(() => 0.5 - Math.random()).slice(0, 5);
        let cards = [];
        pool.forEach(x => { cards.push({ v: x.w, img: x.img, id: x.d, type: 'q' }); cards.push({ v: x.d, id: x.d, type: 'a' }); });
        cards.sort(() => 0.5 - Math.random());
        
        const grid = document.getElementById('m-grid'); grid.innerHTML = '';
        cards.forEach(it => {
            const d = document.createElement('div'); d.className = 'm-card';
            d.innerHTML = (it.type === 'q' && it.img) ? `<img src="${it.img}" style="width:100%;height:100%;object-fit:cover;border-radius:12px;">` : `<b>${it.v || ''}</b>`;
            d.onclick = () => {
                if(this.mLocked || d.classList.contains('right') || d.classList.contains('wrong')) return;
                d.style.borderColor = 'var(--accent)';
                if(!sel) {
                    sel = { el: d, id: it.id };
                } else {
                    if(sel.el === d) return;
                    if(sel.id === it.id) {
                        d.classList.add('right'); sel.el.classList.add('right'); count++;
                        sel = null;
                        if(count === 5) {
                            clearInterval(this.timer); this.confetti();
                            this.modal(`
                                <h1 style="color:var(--accent); font-size:3rem; margin-bottom:10px;"><i class="fa-solid fa-trophy"></i></h1>
                                <h2 style="margin-bottom:5px;">Utmerket!</h2>
                                <p style="font-size:1.2rem; font-weight:800; color:var(--text-dim); margin-bottom:25px;">Tid: ${this.mTime.toFixed(1)}s</p>
                                <div style="display:grid; gap:10px;">
                                    <button class="btn-main" onclick="app.startMatch()">Spill Igjen</button>
                                    <button class="btn-sec" onclick="app.tab('match')">Lukk</button>
                                </div>
                            `); 
                        }
                    } else {
                        // PENALTY LOGIC
                        this.mLocked = true;
                        this.mTime += 1.5; // ADD 1.5 SECONDS
                        timerEl.classList.add('penalty');
                        const originalTxt = timerEl.innerText;
                        timerEl.innerText = "+1.5s";
                        
                        const first = sel.el;
                        d.classList.add('wrong'); first.classList.add('wrong');
                        
                        setTimeout(() => {
                            timerEl.classList.remove('penalty');
                            d.classList.remove('wrong'); first.classList.remove('wrong');
                            d.style.borderColor = ''; first.style.borderColor = '';
                            sel = null; this.mLocked = false;
                        }, 500);
                    }
                }
            }; grid.appendChild(d);
        });
    },

    /* TEST ENGINE */
    startTest() {
        const s=document.getElementById('s-test').value; if(!s || this.lib[s].words.length < 5) return;
        this.activeSet=s; document.getElementById('t-main').style.display='none'; document.getElementById('t-game').style.display='block';
        document.getElementById('t-submit-btn').style.display='block'; document.getElementById('t-exit-btn').style.display='none';
        const l = document.getElementById('t-list'); l.innerHTML = '';
        const words = [...this.lib[s].words].sort(() => 0.5 - Math.random());
        words.forEach((w, i) => {
            const type = i % 3; const box = document.createElement('div'); box.className = 'card t-q-card'; box.dataset.cor = w.d;
            let h = `<p style="font-weight:800; color:var(--accent);">Oppgave ${i+1}</p>`;
            if(type === 0) { 
                h += `<p>Betydning?</p>${w.img ? `<img src="${w.img}" style="height:100px; border-radius:15px; margin:10px 0;">` : `<h3>${w.w}</h3>`}`;
                const opts = [w.d, ...words.filter(x => x.d !== w.d).map(x => x.d)].slice(0, 4).sort(() => 0.5 - Math.random());
                opts.forEach(o => h += `<button class="btn-sec t-opt" onclick="app.selT(this)" data-ans="${o}">${o}</button>`);
            } else if(type === 1) { 
                const isCorrect = Math.random() > 0.5; const displayAns = isCorrect ? w.d : words[Math.floor(Math.random()*words.length)].d;
                box.dataset.cor = isCorrect ? "SANT" : "USANT";
                h += `<p>Betyr dette "${displayAns}"?</p>${w.img ? `<img src="${w.img}" style="height:100px; border-radius:15px; margin:10px 0;">` : `<h3>${w.w}</h3>`}`;
                h += `<button class="btn-sec t-opt" onclick="app.selT(this)" data-ans="SANT">SANT</button><button class="btn-sec t-opt" onclick="app.selT(this)" data-ans="USANT">USANT</button>`;
            } else { 
                h += `<p>Skriv:</p>${w.img ? `<img src="${w.img}" style="height:100px; border-radius:15px; margin:10px 0;">` : `<h3>${w.w}</h3>`}`;
                h += `<input type="text" class="t-wr" placeholder="..." data-cor="${w.d}">`;
            }
            box.innerHTML = h; l.appendChild(box);
        });
    },
    selT(b){ b.parentElement.querySelectorAll('.t-opt').forEach(x=>x.classList.remove('selected')); b.classList.add('selected'); },
    gradeTest() {
        let c = 0, total = 0;
        document.querySelectorAll('#t-list .t-q-card').forEach(q => {
            total++; const sel = q.querySelector('.t-opt.selected'); const wr = q.querySelector('.t-wr');
            let isCorrect = false; let cor = q.dataset.cor;
            if(sel) isCorrect = (sel.dataset.ans === cor); else if(wr) isCorrect = (wr.value.trim().toLowerCase() === cor.toLowerCase());
            if(isCorrect) { c++; q.classList.add('correct'); } else { q.classList.add('incorrect'); q.innerHTML += `<p style="font-size:0.75rem; color:var(--success); font-weight:700;">Riktig: ${cor}</p>`; }
        });
        document.getElementById('t-submit-btn').style.display='none'; document.getElementById('t-exit-btn').style.display='block';
        this.modal(`<h1>Resultat: ${Math.round(c/total*100)}%</h1><button class="btn-main" onclick="app.closeM()">Gå gjennom</button>`);
    },

    /* GLOSSARY UTILS */
    addSet(){ const n=document.getElementById('set-name').value; if(n){ this.lib[n]={words:[], langW:'nb-NO', langD:'en-US'}; this.save(); document.getElementById('set-name').value=''; } },
    openSet(n){ this.activeSet=n; document.getElementById('editor').style.display='block'; document.getElementById('edit-title').innerText=n; 
                document.getElementById('lang-w').value = this.lib[n].langW; document.getElementById('lang-d').value = this.lib[n].langD; this.renderWords(); },
    saveLang(){ if(this.activeSet){ this.lib[this.activeSet].langW = document.getElementById('lang-w').value; this.lib[this.activeSet].langD = document.getElementById('lang-d').value; this.save(); } },
    addWord(){
        const w=document.getElementById('w-in').value, d=document.getElementById('d-in').value; if(!d && !this.tempI) return;
        this.lib[this.activeSet].words.push({w, d, img:this.tempI, s:0});
        this.tempI=null; document.getElementById('w-in').value=''; document.getElementById('d-in').value='';
        document.getElementById('img-prev').style.display='none'; document.getElementById('img-hint').style.display='block';
        this.save(); this.renderWords();
    },
    renderWords(){
        const l=document.getElementById('word-list'); l.innerHTML='';
        this.lib[this.activeSet].words.forEach((it,i)=>{
            l.innerHTML+=`<div style="padding:15px; border-bottom:1px solid #242b3d; display:flex; justify-content:space-between; align-items:center;">
                <span>${it.img?'<i class="fa-regular fa-image" style="color:var(--accent); margin-right:8px;"></i>':''}<b>${it.w || ''}</b>${it.w && it.d ? ': ' : ''}${it.d || ''}</span>
                <i class="fa-solid fa-trash" style="color:var(--danger); cursor:pointer;" onclick="app.lib['${app.activeSet}'].words.splice(${i},1); app.save(); app.renderWords();"></i>
            </div>`;
        });
    },
    renderSets(){
        const l=document.getElementById('set-list'); l.innerHTML='';
        Object.keys(this.lib).forEach(k=>{
            l.innerHTML+=`<div class="card" style="padding:20px; display:flex; justify-content:space-between; cursor:pointer;" onclick="app.openSet('${k}')"><b>${k}</b><span>${this.lib[k].words.length} <i class="fa-solid fa-chevron-right"></i></span></div>`;
        });
    },
    fillDrops(){ ['s-flash','s-match','s-mast','s-test'].forEach(id=>{ const el=document.getElementById(id); if(el){el.innerHTML='<option value="">Velg sett...</option>'; Object.keys(this.lib).forEach(k=>el.innerHTML+=`<option value="${k}">${k}</option>`);} }); [document.getElementById('lang-w'),document.getElementById('lang-d')].forEach(d=>{ if(d){d.innerHTML=''; this.langs.forEach(l=>d.innerHTML+=`<option value="${l.c}">${l.n}</option>`);} }); },
    updateDrops(){ this.fillDrops(); },
    confetti() { for(let i=0; i<50; i++){ const c = document.createElement('div'); c.className='confetti'; c.style.left = Math.random()*100+'vw'; c.style.background = `hsl(${Math.random()*360}, 100%, 50%)`; c.style.animation = `fall ${1.5+Math.random()}s linear forwards`; document.body.appendChild(c); setTimeout(()=>c.remove(), 2000); } }
};
window.onload=()=>app.init();
</script>
