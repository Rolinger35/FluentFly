<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fluent Fly | Final Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --accent: #6366f1; --bg: #0f172a; --card-bg: #1e293b; --text: #f8fafc; --text-dim: #94a3b8; --success: #10b981; --danger: #ef4444; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; padding-bottom: 100px; min-height: 100vh; }

        nav { position: fixed; bottom: 0; width: 100%; background: #1e293b; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid rgba(255,255,255,0.1); z-index: 9999; }
        .nav-btn { background: none; border: none; color: var(--text-dim); display: flex; flex-direction: column; align-items: center; font-size: 0.7rem; font-weight: 700; cursor: pointer; flex: 1; }
        .nav-btn.active { color: var(--accent); }
        .nav-btn i { font-size: 1.4rem; margin-bottom: 4px; }

        .page { width: 92%; max-width: 500px; margin: 20px auto; display: none; }
        .page.active { display: block; }
        .card { background: var(--card-bg); padding: 25px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.08); text-align: center; margin-bottom: 15px; }

        input, select { width: 100%; background: #0f172a; border: 2px solid #334155; padding: 14px; border-radius: 14px; color: white; margin-bottom: 12px; font-size: 1rem; }
        .btn-main { background: var(--accent); color: white; border: none; padding: 16px; border-radius: 14px; font-weight: 800; width: 100%; cursor: pointer; text-transform: uppercase; }
        .btn-back { background: rgba(255,255,255,0.05); color: var(--text-dim); border: 1px solid #334155; padding: 10px 15px; border-radius: 12px; margin-bottom: 20px; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; font-size: 0.9rem; }

        /* FLASHCARD 3D FLIP */
        .flash-container { perspective: 1000px; width: 100%; height: 250px; cursor: pointer; margin-bottom: 20px; }
        .flash-inner { position: relative; width: 100%; height: 100%; text-align: center; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); transform-style: preserve-3d; }
        .flash-container.flipped .flash-inner { transform: rotateY(180deg); }
        .flash-front, .flash-back { position: absolute; width: 100%; height: 100%; -webkit-backface-visibility: hidden; backface-visibility: hidden; display: flex; align-items: center; justify-content: center; border-radius: 24px; padding: 20px; font-size: 1.8rem; font-weight: 800; box-shadow: 0 10px 30px rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); }
        .flash-front { background: var(--accent); color: white; }
        .flash-back { background: #4f46e5; color: white; transform: rotateY(180deg); }

        /* TEST REVIEW */
        .q-box { background: rgba(0,0,0,0.2); padding: 15px; border-radius: 15px; margin-bottom: 15px; text-align: left; border-left: 4px solid var(--accent); }
        .q-box.correct { border-left-color: var(--success); background: rgba(16, 185, 129, 0.1); }
        .q-box.wrong { border-left-color: var(--danger); background: rgba(239, 68, 68, 0.1); }
        .feedback-text { font-size: 0.85rem; margin-top: 8px; font-weight: 700; display: none; color: var(--success); }
        .opt-btn { background: #334155; margin-top: 8px; text-align: left; padding: 12px; width: 100%; color: white; border: none; border-radius: 10px; cursor: pointer; }
        .opt-btn.selected { background: var(--accent); }
        .opt-btn.correct-ans { background: var(--success) !important; }
        .opt-btn.wrong-ans { background: var(--danger) !important; }

        /* MASTERY STUFF */
        .toggle-box { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 15px; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 12px; font-size: 0.8rem; }
        .switch { position: relative; display: inline-block; width: 44px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; inset: 0; background-color: #334155; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--accent); }
        input:checked + .slider:before { transform: translateX(22px); }
        .dot { width: 12px; height: 12px; border-radius: 50%; background: #334155; display: inline-block; margin: 0 3px; }
        .dot.active { background: var(--success); box-shadow: 0 0 8px var(--success); }
        
        #modal { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.98); display: none; align-items: center; justify-content: center; z-index: 10000; padding: 20px; }
        .modal-box { background: var(--card-bg); padding: 30px; border-radius: 25px; border: 2px solid var(--accent); width: 100%; max-width: 400px; text-align: center; }
    </style>
</head>
<body>

<nav>
    <button class="nav-btn active" onclick="app.tab('glossary')"><i class="fa-solid fa-folder"></i>Sett</button>
    <button class="nav-btn" onclick="app.tab('flash')"><i class="fa-solid fa-clone"></i>Kort</button>
    <button class="nav-btn" onclick="app.tab('match')"><i class="fa-solid fa-bolt"></i>Match</button>
    <button class="nav-btn" onclick="app.tab('mastery')"><i class="fa-solid fa-graduation-cap"></i>Lær</button>
    <button class="nav-btn" onclick="app.tab('test')"><i class="fa-solid fa-vial"></i>Test</button>
</nav>

<div id="modal">
    <div class="modal-box" id="modal-content"></div>
</div>

<div id="p-glossary" class="page active">
    <div class="card">
        <h1 style="color:var(--accent); margin-bottom:15px;">Fluent Fly</h1>
        <div style="display:flex; gap:8px;">
            <input type="text" id="set-name" placeholder="Nytt sett...">
            <button class="btn-main" style="width:60px" onclick="app.addSet()"><i class="fa-solid fa-plus"></i></button>
        </div>
        <div id="set-list" style="margin-top:15px;"></div>
        <div id="editor" style="display:none; border-top:1px solid #334155; margin-top:20px; padding-top:20px;">
            <h3 id="edit-title">Sett</h3>
            <input type="text" id="w-in" placeholder="Ord">
            <input type="text" id="d-in" placeholder="Betydning">
            <button class="btn-main" onclick="app.addWord()">Lagre</button>
            <div id="word-list" style="margin-top:15px; text-align:left;"></div>
        </div>
    </div>
</div>

<div id="p-flash" class="page">
    <div class="card" id="f-main">
        <h2>Flashcards</h2>
        <select id="s-flash"></select>
        <button class="btn-main" onclick="app.startFlash()">Start</button>
    </div>
    <div id="f-game" style="display:none;">
        <button class="btn-back" onclick="app.tab('flash')"><i class="fa-solid fa-arrow-left"></i> Tilbake</button>
        <div class="flash-container" id="f-container" onclick="this.classList.toggle('flipped')">
            <div class="flash-inner">
                <div class="flash-front" id="f-front"></div>
                <div class="flash-back" id="f-back"></div>
            </div>
        </div>
        <div style="display:flex; gap:10px;"><button class="btn-main" style="background:#334155" onclick="app.navFlash(-1)">Forrige</button><button class="btn-main" onclick="app.navFlash(1)">Neste</button></div>
    </div>
</div>

<div id="p-match" class="page">
    <div class="card" id="m-main">
        <h2>Match</h2>
        <select id="s-match"></select>
        <button class="btn-main" onclick="app.startMatch()">Start</button>
    </div>
    <div id="m-game" style="display:none;">
        <button class="btn-back" onclick="app.tab('match')"><i class="fa-solid fa-arrow-left"></i> Tilbake</button>
        <div class="card"><h2 id="m-timer" style="color:var(--accent);">0.0s</h2><div id="m-grid" style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:15px;"></div></div>
    </div>
</div>

<div id="p-mastery" class="page">
    <div class="card" id="ma-main">
        <h2>Mestring (3x)</h2>
        <div class="toggle-box">Svar med: Betydning <label class="switch"><input type="checkbox" id="mast-toggle"><span class="slider"></span></label> Ord</div>
        <select id="s-mast"></select>
        <button class="btn-main" onclick="app.startMast()">Start</button>
    </div>
    <div id="ma-game" style="display:none;">
        <button class="btn-back" onclick="app.tab('mastery')"><i class="fa-solid fa-arrow-left"></i> Tilbake</button>
        <div class="card">
            <div id="ma-dots" style="margin-bottom:15px;"></div>
            <h3 id="ma-q" style="font-size:1.5rem; margin-bottom:15px;">?</h3>
            <input type="text" id="ma-in" placeholder="Svar..." autocomplete="off">
            <button class="btn-main" onclick="app.checkMast()">Sjekk</button>
            <p id="ma-f" style="margin-top:15px; font-weight:bold;"></p>
        </div>
    </div>
</div>

<div id="p-test" class="page">
    <div class="card" id="t-main">
        <h2>Sluttest</h2>
        <select id="s-test"></select>
        <button class="btn-main" onclick="app.startTest()">Generer Test</button>
    </div>
    <div id="t-game" style="display:none;">
        <button class="btn-back" onclick="app.tab('test')"><i class="fa-solid fa-arrow-left"></i> Tilbake</button>
        <div id="t-list"></div>
        <button class="btn-main" id="t-submit" onclick="app.gradeTest()">Lever Test</button>
        <button class="btn-main" id="t-reload" style="display:none; background:#334155; margin-top:10px;" onclick="app.tab('test')">Prøv Igjen</button>
    </div>
</div>

<script>
const app = {
    lib: JSON.parse(localStorage.getItem('ff_v16')) || {},
    timer: null,
    
    init() { this.renderSets(); this.updateDrops(); },
    save() { localStorage.setItem('ff_v16', JSON.stringify(this.lib)); this.renderSets(); this.updateDrops(); },

    tab(id) {
        clearInterval(this.timer);
        document.querySelectorAll('.page, .nav-btn').forEach(el => el.classList.remove('active'));
        document.getElementById('p-' + id).classList.add('active');
        const idx = {glossary:0, flash:1, match:2, mastery:3, test:4}[id];
        document.querySelectorAll('.nav-btn')[idx].classList.add('active');
        ['f-game', 'm-game', 'ma-game', 't-game'].forEach(g => document.getElementById(g).style.display = 'none');
        ['f-main', 'm-main', 'ma-main', 't-main'].forEach(m => document.getElementById(m).style.display = 'block');
        document.getElementById('t-submit').style.display = 'block';
        document.getElementById('t-reload').style.display = 'none';
    },

    updateDrops() {
        ['s-flash', 's-match', 's-mast', 's-test'].forEach(id => {
            const el = document.getElementById(id);
            el.innerHTML = '<option value="">Velg sett...</option>';
            Object.keys(this.lib).forEach(k => el.innerHTML += `<option value="${k}">${k}</option>`);
        });
    },

    checkRequirement(setName, min) {
        if(!setName) { this.modal("Ops!", "Du må velge et sett først."); return false; }
        const count = this.lib[setName].length;
        if(count < min) {
            this.modal("Trenger flere ord", `Dette settet har ${count} ord. Du trenger minst **${min}** ord for å starte denne modusen.`);
            return false;
        }
        return true;
    },

    /* GLOSSARY */
    addSet() { const n = document.getElementById('set-name').value.trim(); if(n) { this.lib[n] = this.lib[n] || []; this.save(); document.getElementById('set-name').value=''; } },
    renderSets() {
        const container = document.getElementById('set-list'); container.innerHTML = '';
        Object.keys(this.lib).forEach(k => {
            container.innerHTML += `<div style="display:flex; justify-content:space-between; padding:12px; background:rgba(255,255,255,0.05); border-radius:12px; margin-bottom:8px; border:1px solid #334155;">
                <span onclick="app.openSet('${k}')" style="cursor:pointer; font-weight:800;">${k} (${this.lib[k].length})</span>
                <i class="fa-solid fa-trash" onclick="delete app.lib['${k}']; app.save();" style="color:var(--danger); cursor:pointer;"></i>
            </div>`;
        });
    },
    openSet(name) { this.activeSet = name; document.getElementById('editor').style.display = 'block'; document.getElementById('edit-title').innerText = "Sett: " + name; this.renderWords(); },
    addWord() { const w = document.getElementById('w-in').value.trim(), d = document.getElementById('d-in').value.trim(); if(w && d) { this.lib[this.activeSet].push({w, d}); this.save(); this.renderWords(); document.getElementById('w-in').value=''; document.getElementById('d-in').value=''; } },
    renderWords() {
        const container = document.getElementById('word-list'); container.innerHTML = '';
        this.lib[this.activeSet].forEach((it, i) => { container.innerHTML += `<div style="display:flex; justify-content:space-between; padding:8px; border-bottom:1px solid #334155;"><span><b>${it.w}</b>: ${it.d}</span><i class="fa-solid fa-xmark" onclick="app.lib['${app.activeSet}'].splice(${i},1); app.save(); app.renderWords();"></i></div>`; });
    },

    /* GAMES */
    startFlash() {
        const s = document.getElementById('s-flash').value;
        if(!this.checkRequirement(s, 1)) return;
        this.pool = this.lib[s]; this.fIdx = 0;
        document.getElementById('f-main').style.display = 'none'; document.getElementById('f-game').style.display = 'block';
        this.drawFlash();
    },
    drawFlash() {
        document.getElementById('f-container').classList.remove('flipped');
        setTimeout(() => { const it = this.pool[this.fIdx]; document.getElementById('f-front').innerText = it.w; document.getElementById('f-back').innerText = it.d; }, 150);
    },
    navFlash(d) { this.fIdx = (this.fIdx + d + this.pool.length) % this.pool.length; this.drawFlash(); },

    startMatch() {
        const s = document.getElementById('s-match').value;
        if(!this.checkRequirement(s, 4)) return;
        document.getElementById('m-main').style.display = 'none'; document.getElementById('m-game').style.display = 'block';
        const grid = document.getElementById('m-grid'); grid.innerHTML = '';
        let t = 0, count = 0, sel = null;
        this.timer = setInterval(() => { t += 0.1; document.getElementById('m-timer').innerText = t.toFixed(1)+'s'; }, 100);
        let sub = [...this.lib[s]].sort(()=>.5-Math.random()).slice(0,6);
        let cards = []; sub.forEach(x => { cards.push({t:x.w, id:x.w}); cards.push({t:x.d, id:x.w}); });
        cards.sort(()=>.5-Math.random()).forEach(it => {
            const d = document.createElement('div'); d.style = "background:#1e293b; border:2px solid #475569; padding:15px; border-radius:12px; min-height:80px; display:flex; align-items:center; justify-content:center; text-align:center; font-weight:bold; cursor:pointer;";
            d.innerText = it.t;
            d.onclick = () => {
                if(d.style.opacity === '0' || d === sel?.el) return;
                d.style.borderColor = 'var(--accent)';
                if(!sel) sel = {el:d, id:it.id};
                else {
                    if(sel.id === it.id) { d.style.opacity = '0'; sel.el.style.opacity = '0'; count++; if(count===sub.length){ clearInterval(this.timer); app.modal("Ferdig!", t.toFixed(1)+'s'); } }
                    else { t += 2.0; d.style.borderColor = 'var(--danger)'; sel.el.style.borderColor = 'var(--danger)'; let p = sel.el; setTimeout(()=>{d.style.borderColor='#475569'; p.style.borderColor='#475569';}, 400); }
                    sel = null;
                }
            }; grid.appendChild(d);
        });
    },

    startMast() {
        const s = document.getElementById('s-mast').value;
        if(!this.checkRequirement(s, 1)) return;
        this.mastType = document.getElementById('mast-toggle').checked ? 'w' : 'd';
        this.mastPool = this.lib[s].map(it => ({ ...it, streak: 0 }));
        document.getElementById('ma-main').style.display = 'none'; document.getElementById('ma-game').style.display = 'block';
        this.nextMast();
    },
    nextMast() {
        const rem = this.mastPool.filter(i => i.streak < 3); if(!rem.length) return this.modal("Fullført!", "Du har mestret alle ordene.");
        this.cur = rem[Math.floor(Math.random()*rem.length)];
        document.getElementById('ma-q').innerText = (this.mastType === 'w') ? this.cur.d : this.cur.w;
        document.getElementById('ma-in').value = ''; document.getElementById('ma-f').innerText = '';
        const dots = document.getElementById('ma-dots'); dots.innerHTML = '';
        for(let i=0; i<3; i++) dots.innerHTML += `<div class="dot ${i < this.cur.streak ? 'active' : ''}"></div>`;
    },
    checkMast() {
        const val = document.getElementById('ma-in').value.trim().toLowerCase();
        const cor = (this.mastType === 'w') ? this.cur.w.toLowerCase() : this.cur.d.toLowerCase();
        if(val === cor) { this.cur.streak++; setTimeout(()=>this.nextMast(), 600); }
        else { this.cur.streak = 0; document.getElementById('ma-f').innerText = "Riktig: " + cor; }
    },

    startTest() {
        const s = document.getElementById('s-test').value;
        if(!this.checkRequirement(s, 2)) return;
        document.getElementById('t-main').style.display = 'none'; document.getElementById('t-game').style.display = 'block';
        const list = document.getElementById('t-list'); list.innerHTML = '';
        const pool = [...this.lib[s]].sort(()=>.5-Math.random());
        pool.forEach((it, idx) => {
            const type = idx % 3; const d = document.createElement('div'); d.className = 'q-box';
            if(type === 0) {
                let opts = [it.d]; while(opts.length<4 && opts.length<pool.length) { let r = pool[Math.floor(Math.random()*pool.length)].d; if(!opts.includes(r)) opts.push(r); }
                opts.sort(()=>.5-Math.random());
                d.innerHTML = `<p><b>${idx+1}.</b> Betydning av "${it.w}"?</p>`;
                opts.forEach(o => d.innerHTML += `<button class="opt-btn" onclick="app.sel(this)" data-is-correct="${o===it.d}">${o}</button>`);
            } else if(type === 1) {
                const isT = Math.random() > 0.5; const show = isT ? it.d : pool[Math.floor(Math.random()*pool.length)].d;
                d.innerHTML = `<p><b>${idx+1}.</b> Betyr "${it.w}" det samme som "${show}"?</p>
                    <button class="opt-btn" style="width:48%; display:inline-block;" onclick="app.sel(this)" data-is-correct="${(show===it.d)}">Sant</button>
                    <button class="opt-btn" style="width:48%; display:inline-block; margin-left:4%;" onclick="app.sel(this)" data-is-correct="${!(show===it.d)}">Usant</button>`;
            } else { d.innerHTML = `<p><b>${idx+1}.</b> Skriv betydningen av "${it.w}":</p><input type="text" class="t-ans-input" data-ans="${it.d}">`; }
            d.innerHTML += `<p class="feedback-text">Fasit: ${it.d}</p>`; list.appendChild(d);
        });
    },
    sel(b) { b.parentElement.querySelectorAll('.opt-btn').forEach(x=>x.classList.remove('selected')); b.classList.add('selected'); },
    gradeTest() {
        let score = 0; const questions = document.querySelectorAll('.q-box');
        questions.forEach(q => {
            let isCorrect = false; const selBtn = q.querySelector('.opt-btn.selected');
            if(selBtn) {
                if(selBtn.dataset.isCorrect === "true") { isCorrect = true; selBtn.classList.add('correct-ans'); }
                else { selBtn.classList.add('wrong-ans'); q.querySelectorAll('.opt-btn').forEach(b => { if(b.dataset.isCorrect === "true") b.classList.add('correct-ans'); }); }
            }
            const input = q.querySelector('.t-ans-input');
            if(input) { if(input.value.trim().toLowerCase() === input.dataset.ans.toLowerCase()) isCorrect = true; else input.style.borderColor = 'var(--danger)'; }
            if(isCorrect) { score++; q.classList.add('correct'); } else { q.classList.add('wrong'); q.querySelector('.feedback-text').style.display = 'block'; }
        });
        document.getElementById('t-submit').style.display = 'none'; document.getElementById('t-reload').style.display = 'block';
        this.modal("Resultat", score + " / " + questions.length);
    },

    modal(t, v) { document.getElementById('modal-content').innerHTML = `<h2>${t}</h2><p style="margin:20px 0;">${v}</p><button class="btn-main" onclick="app.closeM()">Lukk</button>`; document.getElementById('modal').style.display = 'flex'; },
    closeM() { document.getElementById('modal').style.display = 'none'; }
};
window.onload = () => app.init();
</script>
</body>
</html>
